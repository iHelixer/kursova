<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — F1 Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<nav>
    <a th:href="@{/}" class="nav-logo" style="text-decoration: none; cursor: pointer;">F1 <span>PULSE</span></a>
</nav>

<div class="page">

    <div class="tabs">
        <button type="button" class="tab active" onclick="switchTab('login')">Sign In</button>
        <button type="button" class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div th:if="${param.error}" style="color: #e10600; text-align: center; margin-bottom: 15px; font-weight: bold;">
        <span th:if="${param.error[0] == 'wrong_credentials'}">Невірний email або пароль!</span>
        <span th:if="${param.error[0] == 'email_exists'}">Користувач з таким email вже зареєстрований!</span>
    </div>
    <div th:if="${param.success}" style="color: #006F62; text-align: center; margin-bottom: 15px; font-weight: bold;">
        Реєстрація успішна! Тепер ви можете увійти.
    </div>

    <div class="pane active" id="pane-login">
        <form th:action="@{/login}" method="post">
            <div class="field">
                <label>Email address</label>
                <input type="email" name="email" id="login-email" placeholder="Enter your email" required>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" id="login-pass" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="row-actions">
                <button type="submit" class="btn-submit">Sign In</button>
            </div>
        </form>
    </div>

    <div class="pane" id="pane-register">
        <form th:action="@{/register}" method="post">
            <div class="name-row">
                <div class="field">
                    <label>First name</label>
                    <input type="text" name="firstName" placeholder="First name" required>
                </div>
                <div class="field">
                    <label>Last name</label>
                    <input type="text" name="lastName" placeholder="Last name" required>
                </div>
            </div>

            <div class="field">
                <label>Email address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="field">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" name="password" id="reg-pass" placeholder="Create a password" required>
                </div>
            </div>

            <div class="field">
                <label>Confirm password</label>
                <div class="input-wrap">
                    <input type="password" placeholder="Repeat your password" required>
                </div>
            </div>

            <div class="row-actions">
                <button type="submit" class="btn-submit">Create Account</button>
            </div>
        </form>
    </div>
</div>

<script>
    function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.pane').forEach(pane => pane.classList.remove('active'));

        if (tabName === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('pane-login').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('pane-register').classList.add('active');
        }
    }
</script>
</body>
</html>
